name: Test Helm chart
  
on: pull_request

env:
  HELM_CHART_BASE_PATH: charts
  

jobs:
  test_helm_chart:

    runs-on: ubuntu-latest

    outputs: {}
    
    name: Test Helm chart
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: '0'
      

      - name: Set up Helm
        uses: azure/setup-helm@v1


      - name: Set up YQ
        uses: chrisdickinson/setup-yq@latest
        with:
          yq-version: v4.16.2
      

      - name: Lint helm chart
        run: |
          echo ":: git log"
          git log --stat --pretty=format: -n 1 -- ${{ env.HELM_CHART_BASE_PATH }}
          
          echo
          echo ":: helm lint"
          for HELM_CHART_FILE_PATH in $(find $(git log --name-only --pretty=format: -n 1 -- ${{ env.HELM_CHART_BASE_PATH }}) -name "Chart.yaml"); do
              echo
              helm lint $(dirname ${HELM_CHART_FILE_PATH})
          done

          exit 1