name: Lint and Test Charts

on: pull_request

env:
  HELM_CHARTS_ROOT_PATH: charts
  CHART_TESTING_TARGET_BRANCH: main

jobs:
  test_helm_chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Set up additional variables
        run: |
          echo CHART_TESTING_CHART_DIRS=$(find ${{ env.HELM_CHARTS_ROOT_PATH }} -mindepth 1 -maxdepth 1 -type d | tr '\n' ',' | sed 's/.$//') >> $GITHUB_ENV

      - name: Set up Helm
        uses: azure/setup-helm@v1
        with:
          version: v3.4.0

      - uses: actions/setup-python@v2
        with:
          python-version: 3.7

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.1.0

      - run: |
          cat /opt/hostedtoolcache/ct/v3.4.0/x86_64/etc/lintconf.yaml

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --chart-dirs ${{ env.CHART_TESTING_CHART_DIRS }} --target-branch ${{ env.CHART_TESTING_TARGET_BRANCH }})
          if [[ -n "$changed" ]]; then
            echo "::set-output name=changed::true"
          fi

      - name: Run chart-testing (lint)
        run: ct lint --chart-dirs ${{ env.CHART_TESTING_CHART_DIRS }} --target-branch ${{ env.CHART_TESTING_TARGET_BRANCH }} --debug

      - name: Create kind cluster
        uses: helm/kind-action@v1.2.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Run chart-testing (install)
        run: ct install --chart-dirs ${{ env.CHART_TESTING_CHART_DIRS }} --target-branch ${{ env.CHART_TESTING_TARGET_BRANCH }}