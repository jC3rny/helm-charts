name: Sync Rancher local-path-provisioner

env:
  CHART_OWNER: Rancher
  CHART_NAME: local-path-provisioner
  REMOTE_CHART_REPO_URL: https://github.com/rancher/local-path-provisioner.git
  REMOTE_CHART_REPO_NAME: local-path-provisioner
  REMOTE_CHART_ROOT_PATH: deploy/chart
  REMOTE_CHART_FILE_URL: https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/chart/Chart.yaml
  LOCAL_CHARTS_ROOT_PATH: charts
  LOCAL_CHART_PATH_PREFIX: _rancher
  LOCAL_CHART_ROOT_PATH: ${LOCAL_CHARTS_ROOT_PATH}/${LOCAL_CHART_PATH_PREFIX}/${CHART_NAME}
  # PR_COMMIT_BASE_BRANCH: main

on:
  # push:
  #   branches: [ master ]
  # pull_request:
  #   branches: [ master ]
  schedule:
    - cron:  "30 */6 * * *"
  workflow_dispatch:

jobs:
  check_version:
    runs-on: ubuntu-latest
    
    outputs:
      REMOTE_VERSION: ${{ steps.localPathProvisionerVersion.outputs.REMOTE_VERSION }}
      LOCAL_VERSION: ${{ steps.localPathProvisionerVersion.outputs.LOCAL_VERSION }}
    
    steps:
      - uses: actions/checkout@v2
      
      - name: Get version
        id: localPathProvisionerVersion
        run: |
          echo ::set-output name=REMOTE_VERSION::$(curl -SsL ${{ env.REMOTE_CHART_FILE_URL }} | grep -oP '(?<=^version: ).*')
          echo ::set-output name=LOCAL_VERSION::$(grep -oP '(?<=^version: ).*' ${{ env.LOCAL_CHART_ROOT_PATH }}/Chart.yaml)


  sync_chart:
    needs: [ check_version ]
    
    runs-on: ubuntu-latest
    
    if: needs.check_version.outputs.REMOTE_VERSION != needs.check_version.outputs.LOCAL_VERSION
    
    steps:
      - uses: actions/checkout@v2

      - name: Clone remote repository
        run: |
          git clone ${{ env.REMOTE_CHART_REPO_URL }} ${RUNNER_TEMP}/${{ env.REMOTE_CHART_REPO_NAME }}
          echo ""
          cd ${RUNNER_TEMP}/${{ env.CHART_NAME }}
          git log --stat --pretty=format: -n 1 ${{ env.REMOTE_CHART_ROOT_PATH }}
          echo ""
          echo ORIGINAL_COMMIT_ID=$(git log --pretty=format:"%H" -n 1 ${{ env.REMOTE_CHART_ROOT_PATH }}) >> $GITHUB_ENV
          echo ORIGINAL_COMMIT_AUTHOR_NAME=$(git log --pretty=format:"%aN" -n 1 ${{ env.REMOTE_CHART_ROOT_PATH }}) >> $GITHUB_ENV
          echo ORIGINAL_COMMIT_AUTHOR_EMAIL=$(git log --pretty=format:"%aE" -n 1 ${{ env.REMOTE_CHART_ROOT_PATH }}) >> $GITHUB_ENV
          echo ORIGINAL_COMMIT_DATE=$(git log --pretty=format:"%aD" -n 1 ${{ env.REMOTE_CHART_ROOT_PATH }}) >> $GITHUB_ENV
          echo ORIGINAL_COMMIT_MESSAGE=$(git log --pretty=format:"%B" -n 1 ${{ env.REMOTE_CHART_ROOT_PATH }}) >> $GITHUB_ENV
          echo ORIGINAL_COMMIT_URL=$(sed -r "s/\.git$/\/commit\/$(git log --pretty=format:"%H" -n 1 ${{ env.REMOTE_CHART_ROOT_PATH }})/" <<< ${{ env.REMOTE_CHART_REPO_URL }}) >> $GITHUB_ENV

      - name: Setup local path
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/${{ env.LOCAL_CHART_ROOT_PATH }}
          cp -rfv ${RUNNER_TEMP}/${{ env.REMOTE_CHART_REPO_NAME }}/${{ env.REMOTE_CHART_ROOT_PATH }}/* ${GITHUB_WORKSPACE}/${{ env.LOCAL_CHART_ROOT_PATH }}/
        # echo ""
        # echo "${GITHUB_WORKSPACE}/${{ env.LOCAL_CHART_ROOT_PATH }}"
        # echo "$(ls -alh ${GITHUB_WORKSPACE}/${{ env.LOCAL_CHART_ROOT_PATH }})"
      
      # - name: Print variables
      #   run: |
      #     echo "CHART_OWNER: ${{ env.CHART_OWNER }}"
      #     echo "CHART_NAME: ${{ env.CHART_NAME }}"
      #     echo "REMOTE_VERSION: ${{ needs.check_version.outputs.REMOTE_VERSION }}"
      #     echo "LOCAL_VERSION: ${{ needs.check_version.outputs.LOCAL_VERSION }}"
      #     echo "LOCAL_CHART_ROOT_PATH: ${{ env.LOCAL_CHART_ROOT_PATH }}"
      #     echo ""
      #     echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
      #     echo "$(ls -alh ${GITHUB_WORKSPACE})"
      #     echo ""
      #     echo "RUNNER_TEMP: ${RUNNER_TEMP}"
      #     echo "$(ls -alh ${RUNNER_TEMP})"
      #     echo ""
      #     echo "$(git status)"
      #     echo ""
      #     echo "ORIGINAL_COMMIT_ID: ${{ env.ORIGINAL_COMMIT_ID }}"
      #     echo "ORIGINAL_COMMIT_AUTHOR: ${{ env.ORIGINAL_COMMIT_AUTHOR }}"
      #     echo "ORIGINAL_COMMIT_DATE: ${{ env.ORIGINAL_COMMIT_DATE }}"
      #     echo "ORIGINAL_COMMIT_MESSAGE: ${{ env.ORIGINAL_COMMIT_MESSAGE }}"
      #     echo "ORIGINAL_COMMIT_URL: ${{ env.ORIGINAL_COMMIT_URL }}"
      #     echo ""
      #     echo "PR_COMMIT_PATH: ${{ env.PR_COMMIT_PATH }}"

      - name: Create Pull Request
        id: createPullRequest
        uses: peter-evans/create-pull-request@v3
        with:
          token: ${{ secrets.PAT_PUBLIC_MGR }}
          title: "[Sync] ${{ env.CHART_OWNER }} ${{ env.CHART_NAME }} chart (version ${{ needs.check_version.outputs.REMOTE_VERSION }})"
          body: |
            ## Original commit log
            <br/>

            > commit [${{ env.ORIGINAL_COMMIT_ID }}][1]
            >
            > Author: [${{ env.ORIGINAL_COMMIT_AUTHOR_NAME }}](mailto:${{ env.ORIGINAL_COMMIT_AUTHOR_EMAIL }})
            >
            > Date: &nbsp;&nbsp;&nbsp;${{ env.ORIGINAL_COMMIT_DATE }}
            >
            > &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${{ env.ORIGINAL_COMMIT_MESSAGE }}
            
            [1]: ${{ env.ORIGINAL_COMMIT_URL }}
          labels: |
            automated
            sync
            ${{ env.CHART_NAME }}
          commit-message: ${{ env.ORIGINAL_COMMIT_MESSAGE }}
          author: ${{ env.ORIGINAL_COMMIT_AUTHOR_NAME }} <${{ env.ORIGINAL_COMMIT_AUTHOR_EMAIL }}>
          signoff: true
          branch: ${{ env.CHART_NAME }}/patch
          branch-suffix: short-commit-hash
          delete-branch: true
      
      - name: Enable Pull Request Automerge
        if: steps.createPullRequest.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@v1
        with:
          token: ${{ secrets.PAT_PUBLIC_MGR }}
          pull-request-number: ${{ steps.createPullRequest.outputs.pull-request-number }}
          merge-method: squash

      - name: Auto approve
        if: steps.createPullRequest.outputs.pull-request-operation == 'created'
        uses: juliangruber/approve-pull-request-action@v1
        with:
          github-token: ${{ secrets.PAT_PUBLIC_MGR }}
          number: ${{ steps.createPullRequest.outputs.pull-request-number }}
