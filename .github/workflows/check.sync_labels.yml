name: Label Checker

on:
  pull_request:
    types:
      - opened
      - labeled
  # workflow_dispatch:

jobs:
  check_sync_labels:

    runs-on: ubuntu-latest
    
    steps:
      - uses: docker://agilepathway/pull-request-label-checker:latest
        with:
          repo_token: ${{ secrets.PAT_PUBLIC_MGR }}
          all_of: sync, automated