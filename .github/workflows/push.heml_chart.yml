name: Push Helm chart

on:
  push:
    branches: [ main ]
    paths:
      - 'charts/**'
  # pull_request:
  #   branches: [ master ]
  workflow_dispatch:

env:
  HELM_REPO_URL: https://charts.c3rny.ninja
  PUBLISH_REPO_TARGET_BRANCH: gh-pages
  PUBLISH_PACKAGES_ROOT_PATH: packages
  SOURCE_REPO_URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}
  SOURCE_REPO_DEFAULT_BRANCH: main
  SOURCE_REPO_CLONE_PATH: ${RUNNER_TEMP}/${GITHUB_REPOSITORY}
  SOURCE_REPO_ROOT_PATH: charts

jobs:
  push_helm_chart:
    runs-on: ubuntu-latest
    
    outputs: {}
    
    name: Push Helm chart
    steps:
      - name: Checkout GitHub Pages
        uses: actions/checkout@v2
        with:
          ref: ${{ env.PUBLISH_REPO_TARGET_BRANCH }}


      - name: Checkout source repository
        run: |
          mkdir -p ${{ env.SOURCE_REPO_CLONE_PATH }}
          
          git clone ${{ env.SOURCE_REPO_URL }} ${{ env.SOURCE_REPO_CLONE_PATH }}

          echo
          cd ${{ env.SOURCE_REPO_CLONE_PATH }}
          pwd
          echo "git status"
          git status
          echo
          echo "git diff-tree --no-commit-id --stat -r ${GITHUB_SHA}"
          git diff-tree --no-commit-id --stat -r ${GITHUB_SHA}
          echo
          echo "git diff-tree --no-commit-id --name-only -r ${GITHUB_SHA} -- ${{ env.SOURCE_REPO_ROOT_PATH }}"
          git diff-tree --no-commit-id --name-only -r ${GITHUB_SHA} -- ${{ env.SOURCE_REPO_ROOT_PATH }}
          echo
          echo  "GITHUB_REF_NAME: ${GITHUB_REF_NAME}"
          echo  "GITHUB_SHA: ${GITHUB_SHA}"
          

      - name: Set up Helm
        uses: azure/setup-helm@v1
      
      
      - name: Set up YQ
        uses: chrisdickinson/setup-yq@latest
      
      - name: Set up ENV
        run: |
          echo HELM_REPO_NAME=$(basename ${{ env.HELM_REPO_URL }} | sed -r 's|charts\.||') >> $GITHUB_ENV


      - name: Set up Helm repository
        run: |
          helm repo add ${{ env.HELM_REPO_NAME }} ${{ env.HELM_REPO_URL }}
          echo
          helm repo update
      

      - name: Publish packages
        run: |
          cd ${{ env.SOURCE_REPO_CLONE_PATH }}; pwd
          echo

          for CHART_FILE in $(find $(git diff-tree --no-commit-id --name-only -r ${GITHUB_SHA} -- ${{ env.SOURCE_REPO_ROOT_PATH }} | xargs dirname) -name "Chart.yaml" 2> /dev/null | uniq); do
              if [ -d "$(dirname ${CHART_FILE})" ]; then
                
                  if [ "${GITHUB_REF_NAME}" != "${{ env.SOURCE_REPO_DEFAULT_BRANCH }}" ]; then
                      yq eval -i '.version = .version + "-alpha"' ${CHART_FILE}
                  fi

                  CHART_NAME="$(yq eval '.name' ${CHART_FILE})"
                  CHART_VERSION="$(yq eval '.version' ${CHART_FILE})"

                  HELM_REPO_CHART_VERSION=$(helm search repo -r "${HELM_REPO_NAME}/${CHART_NAME}[^-]" -o json | jq -r '.[] | select(.version == "'${CHART_VERSION}'").version')

                  echo "****************************************"
                  echo ":: Chart ( ${CHART_NAME} )"
                  
                  helm lint $(dirname ${CHART_FILE})

                  if [ $? -eq 0 ] && [ -z "$HELM_REPO_CHART_VERSION" ]; then
                      echo "---"
                      PUBLISH_PACKAGE_DIRECTORY=""
                      
                      # jC3rny
                      if [ ! -z "$(sed -r "s|^charts/_bitnami/||") <<< ${CHART_FILE}" ]; then PUBLISH_PACKAGE_DIRECTORY="_bitnami"; fi
                      if [ ! -z "$(sed -r "s|^charts/_rancher/||") <<< ${CHART_FILE}" ]; then PUBLISH_PACKAGE_DIRECTORY="_rancher"; fi
                      if [ ! -z "$(sed -r "s|^charts/jC3rny/||") <<< ${CHART_FILE}" ]; then PUBLISH_PACKAGE_DIRECTORY="jC3rny"; fi

                      if [ ! -z "${PUBLISH_PACKAGE_DIRECTORY}" ]; then
                          PUBLISH_PACKAGE_DIR_PATH=${GITHUB_WORKSPACE}/${{ env.PUBLISH_PACKAGES_ROOT_PATH }}/${PUBLISH_PACKAGE_DIRECTORY}
                          
                          mkdir -p ${PUBLISH_PACKAGE_DIR_PATH}
                          mv -fv $(helm package $(dirname ${CHART_FILE}) | awk '{ n=split($0, a, /[\/]/); print a[n] }') ${PUBLISH_PACKAGE_DIR_PATH}

                          helm repo index ${PUBLISH_PACKAGE_DIR_PATH} --url ${{ env.HELM_REPO_URL }}/${PUBLISH_PACKAGE_DIRECTORY} --merge ${GITHUB_WORKSPACE}/index.yaml
                          mv -fv ./index.yaml ${GITHUB_WORKSPACE}/index.yaml
                      fi
                  fi

                  echo "****************************************"
              fi
          done

          cd ${GITHUB_WORKSPACE}
          pwd
          echo
          git diff --stat -- ${{ env.PUBLISH_PACKAGES_ROOT_PATH }}
          echo
          git diff --name-only -- ${{ env.PUBLISH_PACKAGES_ROOT_PATH }}
