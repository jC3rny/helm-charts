name: Push helm charts

on:
  push:
    branches: [ master ]
    paths:
      - 'charts/**'
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  

env:
  PUBLISH_REPO_URL: https://charts.c3rny.ninja
  PUBLISH_REPO_NAME: c3rny.ninja
  PUBLISH_TARGET_BRANCH: gh-pages
  PUBLISH_PACKAGES_ROOT_PATH: packages
  HELM_CHARTS_ROOT_PATH: charts

jobs:
  check_version:
    runs-on: ubuntu-latest
    
    outputs: {}
    
    steps:
      - uses: actions/checkout@v2

      - name: Set up Helm
        uses: azure/setup-helm@v1

      - name: Set up YQ
        uses: chrisdickinson/setup-yq@latest

      - name: Test
        # runs-on: alpine/helm
        run: |
          jq --help
          echo
          yq --help
          echo
          echo "pwd"
          pwd
          echo
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          echo
          helm repo add c3rny.ninja https://charts.c3rny.ninja
          echo
          helm repo update
          echo
          helm repo list
          echo
          helm search repo -r c3rny.ninja -o json --devel
          echo 
          git log --name-only --pretty=format: -n 1 ${{ env.HELM_CHARTS_ROOT_PATH }} | find -name "Chart.yaml" | xargs dirname
