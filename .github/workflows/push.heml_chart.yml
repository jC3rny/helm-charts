name: Push Helm chart

on:
  push:
    branches: [ main ]
    paths:
      - 'charts/**'
  # pull_request:
  #   branches: [ master ]
  workflow_dispatch:

env:
  HELM_REPO_URL: https://charts.c3rny.ninja
  PUBLISH_REPO_TARGET_BRANCH: gh-pages
  PUBLISH_PACKAGES_ROOT_PATH: packages
  SOURCE_REPO_URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}
  SOURCE_REPO_DEFAULT_BRANCH: main
  SOURCE_REPO_CLONE_PATH: ${RUNNER_TEMP}/${GITHUB_REPOSITORY}
  SOURCE_REPO_ROOT_PATH: charts

jobs:
  push_helm_chart:
    runs-on: ubuntu-latest
    
    outputs: {}
    
    name: Push Helm chart
    steps:
      - name: Checkout GitHub Pages
        uses: actions/checkout@v2
        with:
          ref: ${{ env.PUBLISH_REPO_TARGET_BRANCH }}


      - name: Checkout source repository
        run: |
          mkdir -p ${{ env.SOURCE_REPO_CLONE_PATH }}
          
          git clone ${{ env.SOURCE_REPO_URL }} ${{ env.SOURCE_REPO_CLONE_PATH }}

          echo
          cd ${{ env.SOURCE_REPO_CLONE_PATH }}
          pwd
          echo "git status"
          git status
          echo
          echo "git diff-tree --no-commit-id --stat -r ${GITHUB_SHA}"
          git diff-tree --no-commit-id --stat -r ${GITHUB_SHA}
          echo
          echo "git diff-tree --no-commit-id --name-only -r ${GITHUB_SHA} -- ${{ env.SOURCE_REPO_ROOT_PATH }}"
          git diff-tree --no-commit-id --name-only -r ${GITHUB_SHA} -- ${{ env.SOURCE_REPO_ROOT_PATH }}
          echo
          

      - name: Set up Helm
        uses: azure/setup-helm@v1
      
      
      - name: Set up YQ
        uses: chrisdickinson/setup-yq@latest
      
      
      - name: Set up ENV
        run: |
          echo HELM_REPO_NAME=$(basename ${{ env.HELM_REPO_URL }} | sed -r 's|charts\.||') >> $GITHUB_ENV
      
      
      - name: Set up Helm repository
        run: |
          helm repo add ${{ env.HELM_REPO_NAME }} ${{ env.HELM_REPO_URL }}
          echo
          helm repo update
      

      - name: Publish packages
        run: |
          echo ${GITHUB_WORKSPACE}/${{ env.PUBLISH_PACKAGES_ROOT_PATH }}

          cd ${{ env.SOURCE_REPO_CLONE_PATH }}

          # CHART_PATH
          for CHART_FILE in $(find $(git diff-tree --no-commit-id --name-only -r ${GITHUB_SHA} -- ${{ env.SOURCE_REPO_ROOT_PATH }} | xargs dirname) -name "Chart.yaml" | uniq); do
            if [ -d "$(${CHART_FILE} | dirname)" ]; then
              
              if [ "${GITHUB_REF_NAME}" != "${{ env.SOURCE_REPO_DEFAULT_BRANCH }}" ]; then
                yq e '.version = .version + "-alpha"' -i ${CHART_FILE}
              fi

              CHART_NAME="$(yq e '.name' ${CHART_FILE})"
              CHART_VERSION="$(yq e '.version' ${CHART_FILE})"

              HELM_REPO_CHART_VERSION=$(helm search repo -r "${HELM_REPO_NAME}/${CHART_NAME}[^-]" -o json | jq -r '.[] | select(.version == "'$CHART_VERSION'").version')

              echo "****************************************"
              echo ":: Chart ( $CHART_NAME )"
              
              helm lint $(${CHART_FILE} | dirname)

              # if [ $? -eq 0 ] && [ -z $HELM_REPO_CHART_VERSION ]; then
              #   echo "---"
              #   curl \
              #     -sLu ${HELM_REPO_MANAGER_USERNAME}:${HELM_REPO_MANAGER_PASSWORD} $HELM_REPOSITORY_URL \
              #     --upload-file $(helm package $(${CHART_FILE} | dirname) | awk '{ n=split($0,a,/[\/]/); print a[n] }') \
              #     --verbose
              # fi

              echo "****************************************"
            fi
          done

