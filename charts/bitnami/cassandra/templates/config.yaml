{{- if and .Values.cassandra.initDBConfigMap .Values.cassandra.initDBConfigMapData }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.cassandra.initDBConfigMap }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.markerLabels" $ | nindent 4 }}
  annotations:
data:
{{ .Values.cassandra.initDBConfigMapData | indent 2 }}
{{- end }}