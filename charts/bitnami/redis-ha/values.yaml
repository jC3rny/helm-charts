## Default values for redis-ha.
## This is a YAML-formatted file.
## Declare variables to be passed into your templates.

# redis:
#   ## follow instructions on https://github.com/bitnami/charts/tree/master/bitnami/redis
#   ##
#   ## Redis(TM) Authentication parameters
#   auth:
#     enabled: yes
#     existingSecret: "redis-ha-password"
#     existingSecretPasswordKey: "redis-password"
#     existingSecretPasswordValue: 
#   ##
#   ## @section Redis(TM) replicas configuration parameters
#   replica:
#     replicaCount: 5
#   ##
#   ## @section Redis(TM) Sentinel configuration parameters
#   sentinel:
#     enabled: true
#     masterSet: example
#     quorum: 3
#
#
proxy:
  ## If you want to use a proxy, set the following keys { statelessApp = "yes", service: { create = "yes" } } and 
  ## be sure to set the appropriate env variables.
  statelessApp: no

  nameOverride: proxy

  replicaCount: 3

  image:
    repository: "patrickdk/redis-sentinel-proxy"
    tag: "latest"

  env: []
    # - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
    # - { name: DEBUG, value: "true" }
    # - { name: LISTEN, value: ":36379" }
    # - { name: MASTER, value: example }
    # - { name: SENTINEL, value: "redis-ha-headless.$(POD_NAMESPACE):26379" }
    # - { name: PASSWORD, valueFrom: { secretKeyRef: { name: redis-ha-password, key: redis-password } } }
    # - { name: TIMEOUTMS, value: 2000 }
    # - { name: CHECKMS, value: 250 }
  
  service:
    create: no
    portName: tcp-proxy
    portNumber: 36379

  resources: 
    requests: { cpu: 0.015, memory: 32Mi }
    limits: { cpu: 0.03, memory: 64Mi }
