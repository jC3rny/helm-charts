{{- with .Values.redis.auth }}
{{- if and .enabled .existingSecretPasswordValue }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .existingSecret }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "common.basicLabels" $ | nindent 4 }}
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  template:
    type: Opaque
  encryptedData:
    {{ .existingSecretPasswordKey }}: {{ .existingSecretPasswordValue | quote }}
{{- end }}
{{- end }}